{% extends 'base.html' %}

{% block title %}Edit Course - ExamElite{% endblock %}

{% block content %}
<div class="section-full">
    <div class="glass-card" style="max-width: 700px; width: 100%;">
        <div class="mb-5 d-flex align-items-center">
            <a href="{{ url_for('course.index') }}" class="btn btn-sm btn-outline-dark rounded-circle me-3"
                style="width: 40px; height: 40px; padding: 0; display: flex; align-items: center; justify-content: center;">
                <i class="fas fa-arrow-left"></i>
            </a>
            <div>
                <h3 class="fw-bold mb-0">Edit Course</h3>
                <p class="text-muted small mb-0">Updating: <span class="fw-bold text-primary">{{ course.name }}</span>
                </p>
            </div>
        </div>

        <form method="POST">
            <div class="mb-4">
                <label for="name" class="form-label small fw-bold text-uppercase">Course Name</label>
                <div class="input-group">
                    <span class="input-group-text bg-transparent border-end-0"><i
                            class="fas fa-bookmark text-primary"></i></span>
                    <input type="text" class="form-control form-control-custom border-start-0" id="name" name="name"
                        value="{{ course.name }}" required>
                </div>
            </div>

            <div class="mb-5">
                <label for="description" class="form-label small fw-bold text-uppercase">Course Description</label>
                <textarea class="form-control form-control-custom" id="description" name="description"
                    rows="4">{{ course.description }}</textarea>
            </div>

            <div class="d-flex gap-3 mb-5">
                <button type="submit" class="btn btn-premium flex-grow-1 py-3">
                    <i class="fas fa-save me-2"></i>Update Course
                </button>
            </div>
        </form>

        <div class="mt-5 pt-5 border-top">
            <div class="alert alert-danger border-0 glass-card bg-soft-danger"
                style="background: rgba(220, 53, 69, 0.05);">
                <h5 class="fw-bold text-danger mb-3"><i class="fas fa-exclamation-triangle me-2"></i>Danger Zone</h5>
                <p class="small text-muted mb-4">Deleting this course will remove all associated exams, questions, and
                    student results. This action cannot be undone.</p>
                <form action="{{ url_for('course.delete', course_id=course.id) }}" method="POST"
                    onsubmit="return confirm('DESTRUCTIVE ACTION: Are you sure you want to delete this course and all its data?');">
                    <button type="submit" class="btn btn-outline-danger w-100 py-2 rounded-pill">
                        Delete This Course Permanently
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
