{% extends 'base.html' %}

{% block title %}Sign In - ExamElite{% endblock %}

{% block content %}
<div class="section-full">
    <div class="glass-card p-4" style="max-width: 420px; width: 100%;">
        <div class="text-center mb-5">
            <h2 class="fw-bold">Welcome Back</h2>
            <p class="text-muted">Sign in to continue your progress</p>
        </div>

        <form method="POST">
            <div class="mb-4">
                <label for="username" class="form-label small fw-bold">Username</label>
                <div class="input-group">
                    <span class="input-group-text bg-transparent border-end-0"><i
                            class="fas fa-user text-primary"></i></span>
                    <input type="text" class="form-control form-control-custom border-start-0" id="username"
                        name="username" placeholder="Enter your username" required>
                </div>
            </div>

            <div class="mb-4">
                <label for="password" class="form-label small fw-bold">Password</label>
                <div class="input-group">
                    <span class="input-group-text bg-transparent border-end-0"><i
                            class="fas fa-lock text-primary"></i></span>
                    <input type="password" class="form-control form-control-custom border-start-0" id="password"
                        name="password" placeholder="Enter your password" required>
                </div>
            </div>

            <div class="mb-4">
                <label for="role" class="form-label small fw-bold">I am a...</label>
                <div class="d-flex gap-3">
                    <div class="flex-grow-1">
                        <input type="radio" class="btn-check" name="role" id="student" value="student" checked>
                        <label class="btn btn-outline-primary w-100 rounded-10 py-2" for="student">Student</label>
                    </div>
                    <div class="flex-grow-1">
                        <input type="radio" class="btn-check" name="role" id="teacher" value="teacher">
                        <label class="btn btn-outline-primary w-100 rounded-10 py-2" for="teacher">Teacher</label>
                    </div>
                </div>
            </div>

            <button type="submit" class="btn btn-premium w-100 py-3 mb-4">Sign In</button>

            <p class="text-center mb-0">
                Don't have an account? <a href="{{ url_for('auth.register') }}"
                    class="text-primary fw-bold text-decoration-none">Create Account</a>
            </p>
        </form>
    </div>
</div>
{% endblock %}
