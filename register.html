{% extends 'base.html' %}

{% block title %}Join ExamElite{% endblock %}

{% block content %}
<div class="section-full">
    <div class="glass-card p-4" style="max-width: 420px; width: 100%;">
        <div class="text-center mb-5">
            <h2 class="fw-bold">Create Account</h2>
            <p class="text-muted">Join ExamElite and unlock premium exam features</p>
        </div>

        <form method="POST">
            <div class="row">
                <div class="col-md-12 mb-4">
                    <label for="username" class="form-label small fw-bold">Username</label>
                    <div class="input-group">
                        <span class="input-group-text bg-transparent border-end-0"><i
                                class="fas fa-user text-primary"></i></span>
                        <input type="text" class="form-control form-control-custom border-start-0" id="username"
                            name="username" placeholder="Choose a username" minlength="4" maxlength="20"
                            pattern="[A-Za-z][A-Za-z0-9_]{3,19}"
                            title="4-20 characters, start with a letter, use only letters, numbers, or underscore."
                            required>
                    </div>
                </div>
            </div>

            <div class="mb-4">
                <label for="email" class="form-label small fw-bold">Email Address</label>
                <div class="input-group">
                    <span class="input-group-text bg-transparent border-end-0"><i
                                class="fas fa-envelope text-primary"></i></span>
                    <input type="email" class="form-control form-control-custom border-start-0" id="email" name="email"
                        placeholder="email@example.com" required>
                </div>
            </div>

            <div class="mb-4">
                <label for="password" class="form-label small fw-bold">Password</label>
                <div class="input-group">
                    <span class="input-group-text bg-transparent border-end-0"><i
                                class="fas fa-lock text-primary"></i></span>
                    <input type="password" class="form-control form-control-custom border-start-0" id="password"
                        name="password" placeholder="Min. 8 characters" required>
                </div>
            </div>

            <div class="mb-4">
                <label class="form-label small fw-bold">I want to register as...</label>
                <div class="d-flex gap-3">
                    <div class="flex-grow-1">
                        <input type="radio" class="btn-check" name="role" id="student_reg" value="student" checked>
                        <label class="btn btn-outline-primary w-100 rounded-10 py-2" for="student_reg">Student</label>
                    </div>
                    <div class="flex-grow-1">
                        <input type="radio" class="btn-check" name="role" id="teacher_reg" value="teacher">
                        <label class="btn btn-outline-primary w-100 rounded-10 py-2" for="teacher_reg">Teacher</label>
                    </div>
                </div>
            </div>

            <button type="submit" class="btn btn-premium w-100 py-3 mb-4">Create Free Account</button>

            <p class="text-center mb-0">
                Already have an account? <a href="{{ url_for('auth.login') }}"
                    class="text-primary fw-bold text-decoration-none">Sign In</a>
            </p>
        </form>
    </div>
</div>
{% endblock %}
